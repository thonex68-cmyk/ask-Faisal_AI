<!DOCTYPE html>
<html>
<head>
    <title>Faisal AI</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;padding-top:80px;">

<h1>🤖 Faisal AI</h1>

<p>Ask me anything!</p>

<input
id="question"
type="text"
placeholder="Ask Faisal AI..."
style="width:300px;padding:12px;border-radius:8px;">

<br><br>

<button onclick="reply()"
style="padding:12px 25px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;">
Send
</button>

<p id="answer" style="margin-top:30px;font-size:20px;"></p><script>
async function reply() {

    const question = document.getElementById("question").value;

    if (question === "") {
        document.getElementById("answer").innerHTML = "Please type a question.";
        return;
    }

    document.getElementById("answer").innerHTML = "⏳ Faisal AI is thinking...";

    try {
        const response = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: question
            })
        });

        const data = await response.json();

        document.getElementById("answer").innerHTML =
            "<b>🤖 Faisal AI:</b><br><br>" + data.reply;

    } catch (error) {
        document.getElementById("answer").innerHTML =
            "❌ Could not connect to the AI server.";
    }
}
</script>

</body>
</html>
